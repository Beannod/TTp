<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#6366f1">
<title>Gallery</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#a5b4fc 0%,#fbc2eb 100%);min-height:100vh;color:#0f172a;display:flex;align-items:flex-start;justify-content:center;padding:12px 10px 18px;}
.wrap{width:100%;max-width:1020px;}
.appbar{position:sticky;top:0;z-index:1500;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px;margin:0 0 10px;background:rgba(255,255,255,0.78);backdrop-filter:blur(14px);border:1px solid rgba(199,210,254,0.7);border-radius:14px;box-shadow:0 2px 12px rgba(80,80,160,0.10);}
.brand .title{font-size:1.18rem;font-weight:900;letter-spacing:-0.4px;}
.brand .sub{font-size:0.9rem;color:#64748b;font-weight:600;margin-top:2px;}
.actions{display:flex;gap:8px;align-items:center;}
button,a.btn{appearance:none;text-decoration:none;background:rgba(99,102,241,0.10);color:#3730a3;border:none;padding:10px 12px;border-radius:12px;font-weight:800;cursor:pointer;transition:background .15s;}
button:hover,a.btn:hover{background:rgba(99,102,241,0.18);}
.seg{display:inline-flex;border:1px solid rgba(199,210,254,0.9);background:rgba(248,250,252,0.9);border-radius:12px;overflow:hidden;}
.seg button{background:transparent;color:#334155;padding:10px 12px;border-radius:0;font-weight:900;}
.seg button.active{background:rgba(99,102,241,0.14);color:#1e1b4b;}
.card{background:rgba(255,255,255,0.97);border-radius:14px;padding:12px;box-shadow:0 4px 16px rgba(80,80,160,0.10);}
.grid2{display:grid;grid-template-columns:320px 1fr;gap:12px;}
.panel{border:1px solid rgba(199,210,254,0.8);border-radius:12px;background:rgba(248,250,252,0.9);padding:10px;}
.panel h3{margin:0 0 8px;font-size:.96rem;}
.muted{color:#64748b;font-size:.9rem;}
.folder-list{margin-top:8px;max-height:58vh;overflow:auto;padding-right:4px;}
.folder-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px;border-radius:10px;cursor:pointer;transition:background .12s;}
.folder-item:hover{background:rgba(99,102,241,0.10);}
.folder-item.active{background:rgba(99,102,241,0.14);}
.folder-left{display:flex;gap:8px;align-items:center;min-width:0;}
.pill{font-size:.78rem;padding:2px 8px;border-radius:999px;background:rgba(16,185,129,0.14);color:#065f46;font-weight:900;}
input[type="checkbox"]{width:18px;height:18px;}
.toolbar{display:flex;gap:8px;align-items:center;justify-content:space-between;margin-bottom:10px;}
.search{flex:1 1 auto;display:flex;gap:8px;align-items:center;}
input[type="text"]{width:100%;padding:10px 12px;border-radius:12px;border:1px solid #c7d2fe;background:#f8fafc;font-size:.98rem;}
.explorer{border:1px solid rgba(199,210,254,0.8);border-radius:12px;overflow:hidden;}
.thead,.trow{display:grid;grid-template-columns:38px 1fr 110px 170px;gap:10px;align-items:center;padding:10px;}
.thead{background:rgba(224,231,255,0.7);color:#334155;font-weight:900;font-size:.88rem;}
.trow{background:rgba(255,255,255,0.96);border-top:1px solid rgba(226,232,240,0.9);font-size:.94rem;}
.trow:hover{background:rgba(248,250,252,.95);}
.name{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.kind{color:#64748b;font-weight:800;font-size:.88rem;}
.mono{font-family:ui-monospace,monospace;font-size:.88rem;color:#475569;}
.thumbs{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;}
.thumb{border:1px solid rgba(199,210,254,0.8);border-radius:12px;overflow:hidden;background:rgba(255,255,255,.92);cursor:pointer;transition:transform .15s,box-shadow .15s;}
.thumb:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(80,80,160,.18);}
.thumb img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;}
.thumb .cap{padding:8px 10px;font-size:.88rem;color:#334155;word-break:break-word;}
.empty{color:#94a3b8;text-align:center;padding:22px 0;}

/* IMAGE LIGHTBOX */
.lightbox{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(5,8,22,0.90);z-index:2000;padding:18px;opacity:0;transition:opacity .22s ease;}
.lightbox.show{display:flex;}
.lightbox.show.ready{opacity:1;}
.lb-shell{position:relative;display:flex;flex-direction:column;align-items:center;max-width:min(96vw,1080px);width:100%;}
.lb-bar{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;}
.lb-caption{flex:1;color:#cbd5e1;font-size:.92rem;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lb-controls{display:flex;gap:6px;flex-shrink:0;}
.lb-btn{display:inline-flex;align-items:center;justify-content:center;min-width:36px;height:36px;padding:0 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.14);background:rgba(255,255,255,0.08);color:#e2e8f0;font-size:.9rem;cursor:pointer;transition:background .14s;font-weight:700;white-space:nowrap;}
.lb-btn:hover{background:rgba(255,255,255,0.16);}
.lb-img-wrap{position:relative;overflow:hidden;border-radius:14px;background:#0f172a;box-shadow:0 24px 80px rgba(0,0,0,0.6);max-height:80vh;display:flex;align-items:center;justify-content:center;}
.lb-img-wrap img{max-width:min(94vw,1060px);max-height:80vh;border-radius:14px;display:block;transition:transform .2s ease;transform-origin:center center;}
.lb-zoom-pill{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);background:rgba(15,23,42,0.72);color:#e2e8f0;font-size:.75rem;font-weight:900;padding:4px 12px;border-radius:999px;border:1px solid rgba(255,255,255,0.12);pointer-events:none;opacity:0;transition:opacity .2s;}
.lb-zoom-pill.show{opacity:1;}
.lb-meta{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
.lb-meta-tag{font-size:.75rem;padding:3px 9px;border-radius:999px;background:rgba(99,102,241,0.16);color:#a5b4fc;font-weight:800;border:1px solid rgba(99,102,241,0.24);}
.lightbox a.open{display:inline-flex;align-items:center;gap:6px;margin-top:8px;text-decoration:none;background:rgba(99,102,241,0.18);color:#c7d2fe;padding:8px 14px;border-radius:10px;font-weight:900;font-size:.88rem;border:1px solid rgba(99,102,241,0.28);transition:background .15s;}
.lightbox a.open:hover{background:rgba(99,102,241,0.28);}

/* PREMIUM PDF VIEWER */
.pdf-viewer{position:fixed;inset:0;display:none;flex-direction:column;background:#1a1b26;z-index:3000;opacity:0;transition:opacity .22s ease;}
.pdf-viewer.show{display:flex;}
.pdf-viewer.show.ready{opacity:1;}

/* chrome */
.pdf-chrome{height:56px;background:#13141f;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;flex-shrink:0;gap:0;}
.pdf-chrome-left{display:flex;align-items:center;gap:10px;padding:0 14px;min-width:220px;}
.pdf-chrome-center{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;}
.pdf-chrome-right{display:flex;align-items:center;gap:8px;padding:0 14px;min-width:220px;justify-content:flex-end;}
.pdf-title{color:#e2e8f0;font-size:.85rem;font-weight:700;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pdf-sub{color:#475569;font-size:.72rem;}
.pf-btn{display:inline-flex;align-items:center;justify-content:center;min-width:32px;height:32px;padding:0 8px;border-radius:7px;border:1px solid rgba(255,255,255,0.10);background:rgba(255,255,255,0.06);color:#94a3b8;cursor:pointer;transition:background .13s,color .13s;font-size:.85rem;font-weight:700;white-space:nowrap;text-decoration:none;}
.pf-btn:hover{background:rgba(255,255,255,0.12);color:#e2e8f0;}
.pf-btn.accent{background:rgba(99,102,241,0.22);border-color:rgba(99,102,241,0.4);color:#a5b4fc;}
.pf-btn.accent:hover{background:rgba(99,102,241,0.32);}
.pf-btn.success{background:rgba(16,185,129,0.16);border-color:rgba(16,185,129,0.32);color:#6ee7b7;}
.pf-btn.success:hover{background:rgba(16,185,129,0.26);}
.pf-btn.active-tool{background:rgba(99,102,241,0.28);border-color:rgba(99,102,241,0.6);color:#c7d2fe;}
.pf-divider{width:1px;height:24px;background:rgba(255,255,255,0.08);flex-shrink:0;margin:0 4px;}
.pdf-page-input{width:44px;height:32px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:7px;color:#e2e8f0;font-size:.85rem;font-weight:700;text-align:center;outline:none;}
.pdf-page-input:focus{border-color:rgba(99,102,241,0.5);}
.pdf-page-sep{color:#475569;font-size:.82rem;font-weight:600;}
.pdf-zoom-wrap{display:flex;align-items:center;gap:6px;}
.pdf-zoom-label{color:#64748b;font-size:.75rem;font-weight:700;min-width:38px;text-align:center;}
.pdf-zoom-slider{-webkit-appearance:none;appearance:none;width:80px;height:3px;border-radius:2px;background:rgba(255,255,255,0.12);outline:none;cursor:pointer;}
.pdf-zoom-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#6366f1;border:2px solid #a5b4fc;cursor:pointer;}
.pdf-zoom-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#6366f1;border:2px solid #a5b4fc;cursor:pointer;}

/* body */
.pdf-body{flex:1;display:flex;overflow:hidden;}

/* sidebar */
.pdf-sidebar{width:160px;flex-shrink:0;background:#13141f;border-right:1px solid rgba(255,255,255,0.07);overflow-y:auto;padding:10px 8px;display:flex;flex-direction:column;gap:8px;}
.pdf-sidebar::-webkit-scrollbar{width:3px;}
.pdf-sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:2px;}
.pdf-thumb-wrap{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;padding:6px;border-radius:8px;border:1px solid transparent;transition:background .13s,border-color .13s;}
.pdf-thumb-wrap:hover{background:rgba(255,255,255,0.06);}
.pdf-thumb-wrap.active{background:rgba(99,102,241,0.16);border-color:rgba(99,102,241,0.4);}
.pdf-thumb-img{width:100%;aspect-ratio:3/4;object-fit:contain;border-radius:4px;background:#252636;border:1px solid rgba(255,255,255,0.06);}
.pdf-thumb-label{color:#64748b;font-size:.7rem;font-weight:700;}
.pdf-thumb-wrap.active .pdf-thumb-label{color:#a5b4fc;}

/* canvas area */
.pdf-canvas-area{flex:1;overflow:auto;display:flex;flex-direction:column;align-items:center;padding:28px 20px;gap:20px;background:#1e1f2e;}
.pdf-canvas-area::-webkit-scrollbar{width:6px;}
.pdf-canvas-area::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:3px;}
.pdf-page-card{position:relative;border-radius:6px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.5);flex-shrink:0;background:#fff;transition:width .2s ease;}
.pdf-page-card img{display:block;width:100%;}
.pdf-draw-canvas{position:absolute;inset:0;touch-action:none;}

/* status bar */
.pdf-statusbar{height:28px;background:#13141f;border-top:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;padding:0 16px;gap:16px;flex-shrink:0;}
.pdf-status-item{font-size:.72rem;font-weight:600;color:#475569;display:flex;align-items:center;gap:5px;}
.pdf-status-dot{width:6px;height:6px;border-radius:50%;background:#6366f1;flex-shrink:0;}

/* FLOATING HIGHLIGHT PALETTE */
.hl-palette{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:8px;background:#13141f;border:1px solid rgba(255,255,255,0.10);border-radius:40px;padding:8px 14px;box-shadow:0 8px 32px rgba(0,0,0,0.5);z-index:100;white-space:nowrap;}
.hl-palette-label{color:#475569;font-size:.72rem;font-weight:700;margin-right:2px;}
.hl-color-btn{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;flex-shrink:0;transition:transform .13s,border-color .13s;}
.hl-color-btn:hover{transform:scale(1.2);}
.hl-color-btn.active{border-color:#fff;transform:scale(1.15);}
.hl-sep{width:1px;height:18px;background:rgba(255,255,255,0.10);}
.hl-size-btn{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:7px;border:1px solid rgba(255,255,255,0.10);background:rgba(255,255,255,0.06);color:#94a3b8;font-size:.8rem;font-weight:700;cursor:pointer;transition:background .13s;}
.hl-size-btn:hover{background:rgba(255,255,255,0.14);color:#e2e8f0;}
.hl-size-label{color:#64748b;font-size:.72rem;font-weight:700;min-width:22px;text-align:center;}
.hl-undo-btn{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:7px;border:1px solid rgba(255,255,255,0.10);background:rgba(255,255,255,0.06);color:#94a3b8;font-size:.85rem;font-weight:700;cursor:pointer;transition:background .13s;}
.hl-undo-btn:hover{background:rgba(239,68,68,0.18);color:#fca5a5;border-color:rgba(239,68,68,0.3);}

@media(max-width:860px){
  .wrap{max-width:560px;}
  .grid2{grid-template-columns:1fr;}
  .folder-list{max-height:240px;}
  .thead,.trow{grid-template-columns:38px 1fr 90px 140px;}
  .pdf-sidebar{display:none;}
  .pdf-chrome-left,.pdf-chrome-right{min-width:auto;}
  .hl-palette{bottom:10px;padding:6px 10px;gap:6px;}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="appbar">
    <div class="brand">
      <div class="title">Gallery</div>
      <div class="sub">Explorer + Recent uploads</div>
    </div>
    <div class="actions">
      <div class="seg">
        <button id="tab-explorer" class="active" onclick="setMode('explorer')">Explorer</button>
        <button id="tab-recent" onclick="setMode('recent')">Recent</button>
      </div>
      <select id="gallery-folder-select" style="margin-left:10px;"></select>
      <button onclick="useGalleryFolder()">Use</button>
      <a class="btn" href="/">Uploader</a>
    </div>
  </div>

  <div class="card">
    <div id="view-explorer">
      <div class="grid2">
        <div class="panel">
          <h3>Folders</h3>
          <div class="muted">Select one (or multiple) folders to view.</div>
          <div class="folder-list" id="folder-list"></div>
          <div style="display:flex;gap:8px;margin-top:10px;">
            <button onclick="selectAll()">Select all</button>
            <button onclick="clearAll()">Clear</button>
            <button onclick="refreshExplorer()">Refresh</button>
          </div>
        </div>
        <div class="panel">
          <div class="toolbar">
            <div class="search"><input id="q" type="text" placeholder="Search filename..."></div>
            <button onclick="toggleLayout()" id="layout-btn">Thumbnails</button>
          </div>
          <div class="muted" id="explorer-head">No folder selected.</div>
          <div id="explorer-body" style="margin-top:10px;"></div>
        </div>
      </div>
    </div>
    <div id="view-recent" style="display:none;">
      <div class="panel">
        <div class="toolbar">
          <div class="muted" id="recent-head">Loading...</div>
          <button onclick="loadRecent()">Refresh</button>
        </div>
        <div id="recent-body"></div>
      </div>
    </div>
  </div>
</div>

<!-- IMAGE LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <div class="lb-shell">
    <div class="lb-bar">
      <div class="lb-caption" id="lb-caption"></div>
      <div class="lb-controls">
        <button class="lb-btn" onclick="lbZoom(-0.25)">−</button>
        <button class="lb-btn" onclick="lbZoom(0.25)">+</button>
        <button class="lb-btn" onclick="lbResetZoom()" style="font-size:.75rem;">1:1</button>
        <button class="lb-btn" onclick="closeLightbox()">✕</button>
      </div>
    </div>
    <div id="lb-img-section">
      <div class="lb-img-wrap" id="lb-img-wrap">
        <img id="lightbox-img" alt="Preview">
        <div class="lb-zoom-pill" id="lb-zoom-pill">100%</div>
      </div>
      <div class="lb-meta" id="lb-meta"></div>
      <div style="display:flex;justify-content:center;">
        <a id="lightbox-open" class="open" href="#" target="_blank" rel="noopener" style="display:none;">↗ Open full size</a>
      </div>
    </div>
  </div>
</div>

<!-- PREMIUM PDF VIEWER -->
<div class="pdf-viewer" id="pdf-viewer">

  <!-- TOP CHROME -->
  <div class="pdf-chrome">
    <div class="pdf-chrome-left">
      <button class="pf-btn" onclick="closePdfViewer()" title="Close" style="font-size:1rem;">✕</button>
      <button class="pf-btn" onclick="togglePdfSidebar()" title="Thumbnails">☰</button>
      <div style="margin-left:4px;">
        <div class="pdf-title" id="pdf-chrome-title">Document</div>
        <div class="pdf-sub" id="pdf-chrome-sub">PDF Viewer</div>
      </div>
    </div>

    <div class="pdf-chrome-center">
      <!-- page nav -->
      <button class="pf-btn" onclick="pdfPrevPage()" title="Previous page" style="font-size:1.1rem;">‹</button>
      <input class="pdf-page-input" id="pdf-page-input" type="number" min="1" value="1" onchange="pdfGoToPage(this.value)">
      <span class="pdf-page-sep">/ <span id="pdf-total-pages">—</span></span>
      <button class="pf-btn" onclick="pdfNextPage()" title="Next page" style="font-size:1.1rem;">›</button>
      <div class="pf-divider"></div>
      <!-- zoom -->
      <div class="pdf-zoom-wrap">
        <button class="pf-btn" onclick="pdfZoomStep(-1)">−</button>
        <input class="pdf-zoom-slider" id="pdf-zoom-slider" type="range" min="5" max="40" value="16" step="1" oninput="pdfZoomSlider(this.value)">
        <button class="pf-btn" onclick="pdfZoomStep(1)">+</button>
        <div class="pdf-zoom-label" id="pdf-zoom-label">100%</div>
      </div>
      <div class="pf-divider"></div>
      <!-- tools -->
      <button class="pf-btn" id="tool-pan-btn" onclick="setTool('pan')" title="Pan / scroll">✋</button>
      <button class="pf-btn active-tool" id="tool-hl-btn" onclick="setTool('highlight')" title="Freehand highlight">✏</button>
    </div>

    <div class="pdf-chrome-right">
      <button class="pf-btn success" onclick="pdfSaveHighlights()" title="Bake highlights into PDF">Save</button>
      <div class="pf-divider"></div>
      <a id="pdf-open-link" class="pf-btn accent" href="#" target="_blank" rel="noopener">↗ Open</a>
    </div>
  </div>

  <!-- BODY -->
  <div class="pdf-body" id="pdf-body">
    <!-- thumbnail sidebar -->
    <div class="pdf-sidebar" id="pdf-sidebar">
      <div style="color:#475569;font-size:.72rem;text-align:center;padding:4px 0;" id="pdf-sidebar-msg">Load a PDF</div>
    </div>

    <!-- page + canvas -->
    <div class="pdf-canvas-area" id="pdf-canvas-area">
      <div class="pdf-page-card" id="pdf-page-card" style="width:680px;">
        <img id="pdf-page-img" alt="PDF Page">
        <!-- freehand draw canvas -->
        <canvas id="pdf-draw-canvas" class="pdf-draw-canvas"></canvas>
      </div>

      <!-- FLOATING HIGHLIGHT PALETTE -->
      <div class="hl-palette" id="hl-palette">
        <span class="hl-palette-label">Color</span>
        <button class="hl-color-btn active" data-color="rgba(250,204,21,0.45)" style="background:#facc15;" title="Yellow" onclick="setHlColor(this)"></button>
        <button class="hl-color-btn" data-color="rgba(74,222,128,0.45)" style="background:#4ade80;" title="Green" onclick="setHlColor(this)"></button>
        <button class="hl-color-btn" data-color="rgba(96,165,250,0.45)" style="background:#60a5fa;" title="Blue" onclick="setHlColor(this)"></button>
        <button class="hl-color-btn" data-color="rgba(251,113,133,0.45)" style="background:#fb7185;" title="Pink" onclick="setHlColor(this)"></button>
        <button class="hl-color-btn" data-color="rgba(196,148,250,0.45)" style="background:#c484fa;" title="Purple" onclick="setHlColor(this)"></button>
        <button class="hl-color-btn" data-color="rgba(251,146,60,0.45)" style="background:#fb923c;" title="Orange" onclick="setHlColor(this)"></button>
        <div class="hl-sep"></div>
        <span class="hl-palette-label">Size</span>
        <button class="hl-size-btn" onclick="adjustHlSize(-4)">−</button>
        <span class="hl-size-label" id="hl-size-label">16</span>
        <button class="hl-size-btn" onclick="adjustHlSize(4)">+</button>
        <div class="hl-sep"></div>
        <button class="hl-undo-btn" onclick="undoLastStroke()" title="Undo last stroke">↩</button>
      </div>
    </div>
  </div>

  <!-- STATUS BAR -->
  <div class="pdf-statusbar">
    <div class="pdf-status-item"><div class="pdf-status-dot"></div><span id="pdf-status-text">Ready</span></div>
    <div class="pdf-status-item" id="pdf-status-tool" style="margin-left:auto;color:#6366f1;font-weight:800;">Highlight mode</div>
  </div>
</div>

<script>
function refreshGalleryFolders() {
  fetch('/folders')
    .then(r => r.json())
    .then(res => {
      const sel = document.getElementById('gallery-folder-select');
      if (!sel) return;
      sel.innerHTML = '';
      if (res.status !== 'ok') {
        const opt = document.createElement('option');
        opt.value = '';
        opt.textContent = 'All';
        sel.appendChild(opt);
        return;
      }
      const folders = res.folders || [];
      folders.forEach(name => {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;

function formatBytes(b){if(b==null)return'-';if(b<1024)return b+' B';const k=b/1024;if(k<1024)return k.toFixed(1)+' KB';const m=k/1024;if(m<1024)return m.toFixed(1)+' MB';return(m/1024).toFixed(2)+' GB';}
function formatTime(ts){if(!ts)return'-';try{return new Date(ts*1000).toISOString().replace('T',' ').slice(0,19);}catch(e){return'-';}}
function isImage(n){return !!n&&/\.(jpg|jpeg|png|gif|webp|bmp|tif|tiff)$/i.test(n);}
function isPdf(n){return !!n&&/\.pdf$/i.test(n);}
function escH(s){return(s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');}

/* ─────────────────────────────────────────
   FREEHAND DRAW ON CANVAS
───────────────────────────────────────── */
function getDrawCanvas(){return document.getElementById('pdf-draw-canvas');}
function getPageCard(){return document.getElementById('pdf-page-card');}

function syncCanvasSize(){
  const canvas=getDrawCanvas();const card=getPageCard();
  if(!canvas||!card)return;
  const dpr=window.devicePixelRatio||1;
  canvas.style.width=card.offsetWidth+'px';
  canvas.style.height=card.offsetHeight+'px';
  canvas.width=Math.round(card.offsetWidth*dpr);
  canvas.height=Math.round(card.offsetHeight*dpr);
  redrawAllStrokes();
}

function redrawAllStrokes(){
  const canvas=getDrawCanvas();if(!canvas)return;
  const ctx=canvas.getContext('2d');if(!ctx)return;
  const dpr=window.devicePixelRatio||1;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();ctx.scale(dpr,dpr);
  const strokes=(pdfState.highlights[pdfState.page]||[]);
  strokes.forEach(s=>drawStroke(ctx,s,false));
  if(currentStroke) drawStroke(ctx,currentStroke,true);
  ctx.restore();
}

function drawStroke(ctx,stroke,isLive){
  const pts=stroke.points;if(!pts||pts.length<2)return;
  const card=getPageCard();
  const W=card.offsetWidth,H=card.offsetHeight;
  ctx.save();
  ctx.globalCompositeOperation='multiply';
  ctx.globalAlpha=1;
  ctx.strokeStyle=stroke.color;
  ctx.lineWidth=stroke.size*(W/1000);
  ctx.lineCap='round';
  ctx.lineJoin='round';
  ctx.shadowColor='transparent';
  ctx.beginPath();
  ctx.moveTo(pts[0].x*W,pts[0].y*H);
  for(let i=1;i<pts.length;i++){
    if(i<pts.length-1){
      const mx=(pts[i].x+pts[i+1].x)/2*W;
      const my=(pts[i].y+pts[i+1].y)/2*H;
      ctx.quadraticCurveTo(pts[i].x*W,pts[i].y*H,mx,my);
    } else {
      ctx.lineTo(pts[i].x*W,pts[i].y*H);
    }
  }
  ctx.stroke();
  ctx.restore();
}

function clearDrawCanvas(){
  const canvas=getDrawCanvas();if(!canvas)return;
  const ctx=canvas.getContext('2d');if(!ctx)return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  currentStroke=null;
}

function undoLastStroke(){
  const page=pdfState.page;
  if(!pdfState.highlights[page]||!pdfState.highlights[page].length)return;
  pdfState.highlights[page].pop();
  redrawAllStrokes();
}

function bindDrawCanvas(){
  const canvas=getDrawCanvas();if(!canvas)return;
  const card=getPageCard();

  const getPos=e=>{
    const r=card.getBoundingClientRect();
    return{x:(e.clientX-r.left)/r.width,y:(e.clientY-r.top)/r.height};
  };

  canvas.addEventListener('pointerdown',e=>{
    if(pdfState.tool!=='highlight')return;
    e.preventDefault();
    canvas.setPointerCapture(e.pointerId);
    drawPid=e.pointerId;drawing=true;
    const p=getPos(e);
    currentStroke={color:pdfState.hlColor,size:pdfState.hlSize,points:[p]};
    redrawAllStrokes();
  });

  canvas.addEventListener('pointermove',e=>{
    if(!drawing||drawPid!==e.pointerId)return;
    e.preventDefault();
    const p=getPos(e);
    currentStroke.points.push(p);
    redrawAllStrokes();
  });

  const endDraw=e=>{
    if(!drawing||drawPid!==e.pointerId)return;
    e.preventDefault();
    drawing=false;drawPid=null;
    if(currentStroke&&currentStroke.points.length>1){
      if(!pdfState.highlights[pdfState.page]) pdfState.highlights[pdfState.page]=[];
      pdfState.highlights[pdfState.page].push({...currentStroke,points:[...currentStroke.points]});
    }
    currentStroke=null;
    redrawAllStrokes();
    setStatus(`${(pdfState.highlights[pdfState.page]||[]).length} stroke(s) on page ${pdfState.page+1}`);
    try{canvas.releasePointerCapture(e.pointerId);}catch(err){}
  };
  canvas.addEventListener('pointerup',endDraw);
  canvas.addEventListener('pointercancel',endDraw);
}

function pdfLoadInfoAndPage(){
  if(!pdfState.folder||!pdfState.file)return;
  setStatus('Loading…');
  fetch(`/pdf-info?folder=${encodeURIComponent(pdfState.folder)}&file=${encodeURIComponent(pdfState.file)}`)
    .then(r=>r.json())
    .then(res=>{
      if(res.status!=='ok')throw new Error(res.error||'Failed');
      pdfState.pages=res.pages||0;
      pdfState.page=Math.max(0,Math.min(pdfState.page,Math.max(0,pdfState.pages-1)));
      document.getElementById('pdf-total-pages').textContent=pdfState.pages;
      buildSidebarThumbs();
      pdfRenderPage();
    })
    .catch(()=>setStatus('PDF failed to load'));
}

function pdfRenderPage(){
  const img=document.getElementById('pdf-page-img');if(!img)return;
  document.getElementById('pdf-page-input').value=pdfState.page+1;
  const zoomPct=Math.round((pdfState.zoom/1.6)*100);
  const cardW=Math.round(680*(pdfState.zoom/1.6));
  const card=getPageCard();
  if(card) card.style.width=cardW+'px';
  updateSidebarActive();
  const url=`/pdf-page?folder=${encodeURIComponent(pdfState.folder)}&file=${encodeURIComponent(pdfState.file)}&page=${pdfState.page}&zoom=${pdfState.zoom}`;
  img.onload=()=>{syncCanvasSize();setStatus(`Page ${pdfState.page+1} of ${pdfState.pages}`);};
  img.src=url;
  clearDrawCanvas();
  setTimeout(()=>{syncCanvasSize();redrawAllStrokes();},80);
}

function pdfPrevPage(){if(pdfState.page>0){pdfState.page--;pdfRenderPage();}}
function pdfNextPage(){if(pdfState.pages&&pdfState.page<pdfState.pages-1){pdfState.page++;pdfRenderPage();}}
function pdfGoToPage(v){
  const p=Math.max(1,Math.min(pdfState.pages,parseInt(v)||1));
  pdfState.page=p-1;pdfRenderPage();
}
function pdfZoomSlider(v){
  pdfState.zoom=(parseInt(v)/16)*1.6;
  document.getElementById('pdf-zoom-label').textContent=Math.round((pdfState.zoom/1.6)*100)+'%';
  pdfRenderPage();
}
function pdfZoomStep(d){
  const sl=document.getElementById('pdf-zoom-slider');
  const newVal=Math.max(5,Math.min(40,parseInt(sl.value)+d*3));
  sl.value=newVal;pdfZoomSlider(newVal);

function pdfSaveHighlights(){
  if(!pdfState.folder||!pdfState.file)return;
  setStatus('Saving…');
  const allH=[];
  Object.entries(pdfState.highlights).forEach(([pg,strokes])=>{
    strokes.forEach(s=>{allH.push({page:parseInt(pg),...s});});
  });
  fetch('/pdf-apply-highlights',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({folder:pdfState.folder,file:pdfState.file,highlights:allH,freehand:true})
  }).then(r=>r.json()).then(res=>{
    if(res.status!=='ok')throw new Error(res.error||'Failed');
    setStatus(`Saved ${res.applied||0} highlight(s)`);
    setTimeout(()=>pdfRenderPage(),400);

}

───────────────────────────────────────── */
function renderFolderList(){
  const root=document.getElementById('folder-list');root.innerHTML='';
  if(!allFolders.length){root.innerHTML='<div class="empty">No folders found.</div>';return;}
  allFolders.forEach(name=>{
    const row=document.createElement('div');
    row.className='folder-item'+(selectedFolders.has(name)?' active':'');
    row.onclick=()=>toggleFolder(name);
    const left=document.createElement('div');left.className='folder-left';
    const cb=document.createElement('input');cb.type='checkbox';cb.checked=selectedFolders.has(name);
    cb.onclick=e=>{e.stopPropagation();toggleFolder(name);};
    const lbl=document.createElement('div');
    lbl.style.cssText='font-weight:900;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';
    lbl.textContent=name;
    left.appendChild(cb);left.appendChild(lbl);
    const right=document.createElement('div');
    right.innerHTML=(name==='{{folder}}')?'<span class="pill">default</span>':'';
    row.appendChild(left);row.appendChild(right);
    root.appendChild(row);
  });
}
function toggleFolder(name){if(selectedFolders.has(name))selectedFolders.delete(name);else selectedFolders.add(name);renderFolderList();refreshExplorer();}
function selectAll(){allFolders.forEach(f=>selectedFolders.add(f));renderFolderList();refreshExplorer();}
function clearAll(){selectedFolders.clear();renderFolderList();refreshExplorer();}
function toggleLayout(){
  layout=(layout==='thumbs')?'list':'thumbs';
  document.getElementById('layout-btn').textContent=(layout==='thumbs')?'List':'Thumbnails';
  refreshExplorer(true);
}
function getQuery(){return(document.getElementById('q').value||'').trim().toLowerCase();}

function refreshExplorer(skipFetch){
  const head=document.getElementById('explorer-head'),body=document.getElementById('explorer-body');
  const chosen=Array.from(selectedFolders),q=getQuery();
  if(!chosen.length){head.textContent='No folder selected.';body.innerHTML='';return;}
  head.textContent='Loading...';
  if(skipFetch&&window.__lastExplorerData){renderExplorer(window.__lastExplorerData,q);return;}
  fetch('/folder-items?folders='+encodeURIComponent(chosen.join(',')))
    .then(r=>r.json()).then(res=>{
      if(res.status!=='ok')throw new Error(res.error||'Failed');
      window.__lastExplorerData=res.folders||{};renderExplorer(window.__lastExplorerData,q);
    }).catch(()=>{head.textContent='Error';body.innerHTML='<div class="empty">Failed to load folder contents.</div>';});
}

function renderExplorer(data,q){
  const head=document.getElementById('explorer-head'),body=document.getElementById('explorer-body');
  const chosen=Array.from(selectedFolders);const parts=[];
  head.textContent=`Showing ${chosen.length} folder(s)`;
  chosen.forEach(folder=>{
    const items=(data&&data[folder])?data[folder]:[];
    const filtered=items.filter(it=>!q||((it.name||'').toLowerCase().includes(q)));
    const files=filtered.filter(it=>!it.is_dir),dirs=filtered.filter(it=>it.is_dir),total=filtered.length;
    if(layout==='thumbs'){
      const thumbs=files.filter(it=>isImage(it.name)).map(it=>{
        const src=`/uploads/${folder}/${it.name}`;
        return `<div class="thumb" onclick="openLightbox('${src}','${escH(folder+'\\'+it.name)}')"><img src="${src}" alt=""><div class="cap">${escH(it.name)}</div></div>`;
      }).join('');
      const nonImgs=files.filter(it=>!isImage(it.name));
      const listRows=nonImgs.map(it=>`<div class="trow"><div class="kind">FILE</div><div class="name">${escH(it.name)}</div><div class="mono">${formatBytes(it.size)}</div><div class="mono">${formatTime(it.mtime)}</div></div>`).join('');
      parts.push(`<div style="margin-bottom:14px;"><div style="font-weight:900;margin:0 0 8px;">${escH(folder)} <span class="muted">(${total})</span></div>${dirs.length?`<div class="explorer" style="margin-bottom:10px;"><div class="thead"><div></div><div>Name</div><div>Size</div><div>Modified</div></div>${dirs.map(it=>`<div class="trow"><div class="kind">DIR</div><div class="name">${escH(it.name)}</div><div class="mono">-</div><div class="mono">${formatTime(it.mtime)}</div></div>`).join('')}</div>`:``}${thumbs?`<div class="thumbs">${thumbs}</div>`:`<div class="empty">No images.</div>`}${listRows?`<div class="explorer" style="margin-top:10px;"><div class="thead"><div></div><div>Name</div><div>Size</div><div>Modified</div></div>${listRows}</div>`:``}</div>`);
    } else {
      const rows=filtered.map(it=>{
        const kind=it.is_dir?'DIR':(isImage(it.name)?'IMG':'FILE');
        const nameCell=it.is_dir?escH(it.name):(isImage(it.name)?`<a href="javascript:void(0)" onclick="openLightbox('/uploads/${folder}/${it.name}','${escH(folder+'\\'+it.name)}')" style="color:#1d4ed8;text-decoration:none;font-weight:800;">${escH(it.name)}</a>`:(isPdf(it.name)?`<a href="javascript:void(0)" onclick="openPdf('/uploads/${folder}/${it.name}','${escH(folder+'\\'+it.name)}')" style="color:#1d4ed8;text-decoration:none;font-weight:800;">${escH(it.name)}</a>`:escH(it.name)));
        return `<div class="trow"><div class="kind">${kind}</div><div class="name">${nameCell}</div><div class="mono">${it.is_dir?'-':formatBytes(it.size)}</div><div class="mono">${formatTime(it.mtime)}</div></div>`;
      }).join('');
      parts.push(`<div style="margin-bottom:14px;"><div style="font-weight:900;margin:0 0 8px;">${escH(folder)} <span class="muted">(${total})</span></div><div class="explorer"><div class="thead"><div></div><div>Name</div><div>Size</div><div>Modified</div></div>${rows||'<div class="empty">No items.</div>'}</div></div>`);
    }
  });
  body.innerHTML=parts.join('')||'<div class="empty">No items.</div>';
}

function loadFolders(){
  fetch('/folders').then(r=>r.json()).then(res=>{
    if(res.status!=='ok')throw new Error(res.error||'Failed');
    allFolders=res.folders||[];
    if(!selectedFolders.size&&res.current) selectedFolders.add(res.current);
    renderFolderList();refreshExplorer();
  }).catch(()=>{document.getElementById('folder-list').innerHTML='<div class="empty">Failed to load folders.</div>';});

function loadRecent(){
  const head=document.getElementById('recent-head'),body=document.getElementById('recent-body');
  head.textContent='Loading...';body.innerHTML='';
  fetch('/upload-log?limit=200').then(r=>r.json()).then(res=>{
    if(res.status!=='ok')throw new Error(res.error||'Failed');
    const uploads=res.uploads||[];
    const imgs=uploads.filter(u=>isImage(u.original||u.filename||'')||isImage(u.filename||''));
    head.textContent=`Recent: ${uploads.length} (images: ${imgs.length})`;
    if(!uploads.length){body.innerHTML='<div class="empty">No uploads yet.</div>';return;}
    body.innerHTML=uploads.map(u=>{
      const name=u.original||u.filename||'',folder=u.folder||'',path=u.full_path||'';
      const cap=u.captured_time?`Captured: ${u.captured_time}${u.captured_time_source?` (${u.captured_time_source})`:''}`:'';
      const loc=(u.exif_lat!=null&&u.exif_lon!=null)?`GPS: ${Number(u.exif_lat).toFixed(6)}, ${Number(u.exif_lon).toFixed(6)}`:'';
      const reso=u.exif_resolution?`Res: ${u.exif_resolution}`:'';
      const meta=[cap,loc,reso].filter(Boolean).join(' | ');
      const isImg=isImage(name)||isImage(u.filename||'');
      const src=isImg?`/uploads/${folder}/${u.filename}`:'';
      return `<div class="panel" style="margin-bottom:10px;"><div style="font-weight:900;">${escH(name)}</div><div class="muted">${escH(meta||'')}</div><div class="mono" style="margin-top:6px;">${escH(path)}</div>${isImg?`<div style="margin-top:10px;"><div class="thumb" onclick="openLightbox('${src}','${escH(folder+'\\'+(u.filename||''))}')"><img src="${src}" alt=""><div class="cap">${escH(folder+'\\'+(u.filename||''))}</div></div></div>`:''}</div>`;
    }).join('');
  }).catch(()=>{head.textContent='Error';body.innerHTML='<div class="empty">Failed to load.</div>';});
}

/* ─────────────────────────────────────────
   KEYBOARD SHORTCUTS
───────────────────────────────────────── */
window.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeLightbox();closePdfViewer();}
  const pv=document.getElementById('pdf-viewer');
  if(pv.classList.contains('show')){
    if(e.key==='ArrowRight'||e.key==='ArrowDown') pdfNextPage();
    if(e.key==='ArrowLeft'||e.key==='ArrowUp') pdfPrevPage();
    if(e.key==='z'&&(e.ctrlKey||e.metaKey)){e.preventDefault();undoLastStroke();}
    if(e.key==='h') setTool('highlight');
    if(e.key==='p') setTool('pan');
  }
  const lb=document.getElementById('lightbox');
  if(lb.classList.contains('show')){
    if(e.key==='+'||e.key==='=') lbZoom(0.25);
    if(e.key==='-') lbZoom(-0.25);
  }
});

window.addEventListener('resize',()=>{syncCanvasSize();});

/* ─────────────────────────────────────────
   INIT
───────────────────────────────────────── */
document.getElementById('lightbox').addEventListener('click',e=>{if(e.target===document.getElementById('lightbox'))closeLightbox();});
document.getElementById('q').addEventListener('input',()=>refreshExplorer(true));
window.addEventListener('DOMContentLoaded',()=>{
  loadFolders();
  bindImgDrag();
  bindDrawCanvas();
  setTool('highlight');
});
</script>
</body>
</html>
