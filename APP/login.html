<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#6366f1">
<title>Secure Login</title>
<style>
:root {
    --primary: #6366f1;
    --primary-light: #818cf8;
    --accent: #f472b6;
    --bg-1: #a5b4fc;
    --bg-2: #fbc2eb;
    --glass-bg: rgba(255,255,255,0.72);
    --glass-border: rgba(255,255,255,0.45);
    --text: #22223b;
    --shadow: 0 8px 32px rgba(80,80,160,0.18), 0 2px 8px rgba(0,0,0,0.08);
    --radius: 18px;
}

* { box-sizing: border-box; }

html, body {
    height: 100%;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
    overflow: hidden;
    position: relative;
}

/* Animated background orbs */
.orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.55;
    animation: floatOrb 12s ease-in-out infinite;
    z-index: 0;
    pointer-events: none;
}
.orb-1 {
    width: 240px; height: 240px;
    background: var(--primary-light);
    top: -80px; left: -60px;
    animation-delay: 0s;
}
.orb-2 {
    width: 210px; height: 210px;
    background: var(--accent);
    bottom: -60px; right: -40px;
    animation-delay: -4s;
}
.orb-3 {
    width: 150px; height: 150px;
    background: #c7d2fe;
    top: 40%; left: 60%;
    animation-delay: -8s;
}
@keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    33% { transform: translate(30px,-40px) scale(1.08); }
    66% { transform: translate(-20px,20px) scale(0.95); }
}

/* Glassmorphism card */
.login-card {
    background: var(--glass-bg);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border: 1.5px solid var(--glass-border);
    width: 340px;
    max-width: 92vw;
    padding: 28px 22px 22px 22px;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    animation: fadeInUp 0.9s cubic-bezier(0.22,1,0.36,1);
    text-align: center;
    position: relative;
    z-index: 1;
}
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(40px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}

/* Lock icon with pulse */
.lock-wrap {
    width: 56px;
    height: 56px;
    margin: 0 auto 12px auto;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(99,102,241,0.22);
    animation: pulseLock 2.8s ease-in-out infinite;
}
.lock-icon {
    font-size: 1.7rem;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.12));
}
@keyframes pulseLock {
    0%, 100% { box-shadow: 0 4px 16px rgba(99,102,241,0.22), 0 0 0 0 rgba(99,102,241,0.35); }
    50% { box-shadow: 0 4px 16px rgba(99,102,241,0.22), 0 0 0 14px rgba(99,102,241,0); }
}

h2 {
    margin: 0 0 4px 0;
    font-size: 1.35rem;
    font-weight: 700;
    letter-spacing: -0.5px;
}
.subtitle {
    margin: 0 0 16px 0;
    font-size: 0.92rem;
    color: #555570;
    font-weight: 400;
}

/* Input group with icon */
.input-group {
    position: relative;
    margin-bottom: 18px;
}
.input-group svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 20px;
    height: 20px;
    color: var(--primary-light);
    pointer-events: none;
    transition: color 0.2s;
}
input[type="password"] {
    width: 100%;
    padding: 12px 12px 12px 42px;
    border-radius: 14px;
    border: 1.5px solid #d1d5ff;
    font-size: 1rem;
    background: rgba(248,250,252,0.85);
    color: var(--text);
    transition: border 0.25s, box-shadow 0.25s, background 0.25s;
}
input[type="password"]:focus {
    border-color: var(--primary);
    outline: none;
    background: #fff;
    box-shadow: 0 0 0 4px rgba(99,102,241,0.12);
}
.input-group:focus-within svg {
    color: var(--primary);
}

/* Button with ripple */
button {
    background: linear-gradient(90deg, var(--primary) 60%, var(--primary-light) 100%);
    color: white;
    border: none;
    padding: 12px;
    width: 100%;
    border-radius: 14px;
    font-size: 1rem;
    font-weight: 600;
    margin-top: 4px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.25s, filter 0.25s;
    box-shadow: 0 4px 14px rgba(99,102,241,0.18);
    position: relative;
    overflow: hidden;
}
button:hover {
    filter: brightness(1.08);
    box-shadow: 0 6px 22px rgba(99,102,241,0.28);
    transform: translateY(-1px);
}
button:active {
    transform: translateY(0);
}
button .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
    transform: scale(0);
    animation: rippleAnim 0.6s linear;
    pointer-events: none;
}
@keyframes rippleAnim {
    to { transform: scale(4); opacity: 0; }
}

/* Shake for errors */
.shake {
    animation: shake 0.45s cubic-bezier(.36,.07,.19,.97) both;
}
@keyframes shake {
    10%, 90% { transform: translate3d(-1px,0,0); }
    20%, 80% { transform: translate3d(2px,0,0); }
    30%, 50%, 70% { transform: translate3d(-4px,0,0); }
    40%, 60% { transform: translate3d(4px,0,0); }
}

/* Toast notification */
.toast {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: rgba(34,34,59,0.92);
    color: #fff;
    padding: 12px 22px;
    border-radius: 12px;
    font-size: 0.95rem;
    box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s, transform 0.35s;
    z-index: 2000;
    backdrop-filter: blur(8px);
}
.toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
    pointer-events: auto;
}

/* Custom scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #c7d2fe; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #a5b4fc; }

/* Responsive */
@media (max-width: 420px) {
    .login-card { padding: 22px 18px 18px 18px; }
    h2 { font-size: 1.25rem; }
}
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="login-card" id="loginCard">
    <div class="lock-wrap">
        <div class="lock-icon">&#128274;</div>
    </div>
    <h2>Secure Login</h2>
    <p class="subtitle">Enter your password to continue</p>
    <form method="POST" id="loginForm">
        <div class="input-group">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <input name="password" type="password" placeholder="Enter password" required autocomplete="current-password">
        </div>
        <button type="submit">Login</button>
    </form>
</div>

<div class="toast" id="toast"></div>

<script>
// Ripple effect on buttons
document.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', function(e) {
        const rect = btn.getBoundingClientRect();
        const ripple = document.createElement('span');
        ripple.className = 'ripple';
        const size = Math.max(rect.width, rect.height);
        ripple.style.width = ripple.style.height = size + 'px';
        ripple.style.left = (e.clientX - rect.left - size/2) + 'px';
        ripple.style.top = (e.clientY - rect.top - size/2) + 'px';
        btn.appendChild(ripple);
        setTimeout(() => ripple.remove(), 600);
    });
});

// Toast helper
function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}

// Shake on invalid (optional hook)
const form = document.getElementById('loginForm');
const card = document.getElementById('loginCard');
form.addEventListener('submit', function(e) {
    const pw = form.querySelector('input[name="password"]');
    if (!pw.value.trim()) {
        e.preventDefault();
        card.classList.remove('shake');
        void card.offsetWidth; // reflow
        card.classList.add('shake');
        showToast('Please enter your password');
    }
});
</script>
</body>
</html>
