<!DOCTYPE html>
<html>
<head>
<style>
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #a5b4fc 0%, #fbc2eb 100%);
    min-height: 100vh;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #22223b;
}
.login-card {
    background: rgba(255,255,255,0.97);
    width: 340px;
    padding: 32px 28px 28px 28px;
    border-radius: 22px;
    box-shadow: 0 8px 32px rgba(80,80,160,0.13), 0 1.5px 8px rgba(0,0,0,0.07);
    animation: fadeIn 0.7s;
    text-align: center;
}
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}
input[type="password"] {
    width: 100%;
    padding: 12px;
    margin: 18px 0 12px 0;
    border-radius: 10px;
    border: 1px solid #c7d2fe;
    font-size: 1rem;
    background: #f8fafc;
    transition: border 0.2s;
}
input[type="password"]:focus {
    border: 1.5px solid #6366f1;
    outline: none;
}
button {
    background: linear-gradient(90deg, #6366f1 60%, #818cf8 100%);
    color: white;
    border: none;
    padding: 12px;
    width: 100%;
    border-radius: 12px;
    font-size: 1rem;
    margin-top: 8px;
    cursor: pointer;
    transition: background 0.2s, box-shadow 0.2s;
    box-shadow: 0 2px 8px rgba(99,102,241,0.07);
}
button:hover {
    background: linear-gradient(90deg, #818cf8 60%, #6366f1 100%);
    box-shadow: 0 4px 16px rgba(99,102,241,0.13);
}
.lock-icon {
    font-size: 2.5rem;
    color: #6366f1;
    margin-bottom: 10px;
}
</style>
</head>
<body>
<div class="login-card">
  <div class="lock-icon">🔒</div>
  <h2 style="margin-bottom:10px;">Secure Login</h2>
  <form method="POST">
    <input name="password" type="password" placeholder="Enter password" required>
    <button type="submit">Login</button>
  </form>
</div>
</body>
</html>
