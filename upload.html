<!DOCTYPE html>
<html>
<head>
<style>
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #a5b4fc 0%, #fbc2eb 100%);
    min-height: 100vh;
    margin: 0;
    text-align: center;
    color: #22223b;
    transition: background 0.5s;
}

.card {
    background: rgba(255,255,255,0.97);
    width: 320px;
    margin: 18px auto 10px auto;
    padding: 16px 14px 12px 14px;
    border-radius: 16px;
    box-shadow: 0 4px 16px rgba(80,80,160,0.10), 0 1.5px 8px rgba(0,0,0,0.07);
    animation: fadeIn 0.7s;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

button {
    background: linear-gradient(90deg, #6366f1 60%, #818cf8 100%);
    color: white;
    border: none;
    padding: 12px;
    width: 100%;
    border-radius: 12px;
    font-size: 1rem;
    margin-top: 8px;
    margin-bottom: 2px;
    cursor: pointer;
    transition: background 0.2s, box-shadow 0.2s;
    box-shadow: 0 2px 8px rgba(99,102,241,0.07);
}
button:hover {
    background: linear-gradient(90deg, #818cf8 60%, #6366f1 100%);
    box-shadow: 0 4px 16px rgba(99,102,241,0.13);
}
.success-btn {
    background: linear-gradient(90deg, #10b981 60%, #34d399 100%) !important;
}
.success-btn:hover {
    background: linear-gradient(90deg, #34d399 60%, #10b981 100%) !important;
}
input[type="text"], input[type="file"], #new-folder {
    width: 100%;
    padding: 12px;
    margin: 10px 0 8px 0;
    border-radius: 10px;
    border: 1px solid #c7d2fe;
    font-size: 1rem;
    background: #f8fafc;
    transition: border 0.2s;
}
input[type="text"]:focus, input[type="file"]:focus, #new-folder:focus {
    border: 1.5px solid #6366f1;
    outline: none;
}
.progress {
    width: 100%;
    background: #e0e7ff;
    border-radius: 10px;
    margin-top: 10px;
    margin-bottom: 8px;
    height: 20px;
    overflow: hidden;
}
.bar {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, #6366f1 60%, #818cf8 100%);
    border-radius: 10px;
    transition: width 0.3s;
}
#status {
    margin: 0 0 10px 0;
    font-size: 1rem;
    color: #6366f1;
}
#log {
    text-align: left;
    margin: 0 auto;
    max-width: 340px;
    padding: 0;
    list-style: none;
}
#log li {
    margin-bottom: 10px;
    background: #f3f4f6;
    border-radius: 8px;
    padding: 8px 12px;
    box-shadow: 0 1px 4px rgba(99,102,241,0.04);
    font-size: 0.97rem;
}
#summary {
    margin: 18px auto 0 auto;
    max-width: 350px;
    background: #f8fafc;
    border-radius: 10px;
    padding: 12px 10px;
    box-shadow: 0 1px 4px rgba(99,102,241,0.04);
}
#upload-log {
    display: none;
    text-align: left;
    margin: 10px auto;
    max-width: 350px;
    background: #f3f4f6;
    padding: 10px;
    border-radius: 10px;
    box-shadow: 0 1px 4px rgba(99,102,241,0.04);
}
.drag-area {
    border: 2px dashed #a5b4fc;
    border-radius: 14px;
    background: #f8fafc;
    padding: 28px 0;
    margin: 12px 0 18px 0;
    cursor: pointer;
    transition: border 0.2s, background 0.2s;
}
.drag-area.dragover {
    border-color: #6366f1;
    background: #e0e7ff;
}
.icon {
    font-size: 2.2rem;
    margin-bottom: 8px;
    color: #6366f1;
}
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
  gap: 10px;
  max-width: 320px;
  margin: 0 auto 18px auto;
  padding: 0;
}
.gallery-grid img {
  width: 100%;
  aspect-ratio: 1/1;
  object-fit: cover;
  border-radius: 10px;
  box-shadow: 0 1px 4px rgba(99,102,241,0.07);
  transition: transform 0.2s;
  cursor: pointer;
}
.gallery-grid img:hover {
  transform: scale(1.04);
  box-shadow: 0 4px 16px rgba(99,102,241,0.13);
}
.floating-upload-btn {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: linear-gradient(90deg, #6366f1 60%, #818cf8 100%);
  color: white;
  border: none;
  border-radius: 50%;
  width: 54px;
  height: 54px;
  font-size: 2rem;
  box-shadow: 0 4px 16px rgba(99,102,241,0.13);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 1000;
  transition: background 0.2s, box-shadow 0.2s;
}
.floating-upload-btn:hover {
  background: linear-gradient(90deg, #818cf8 60%, #6366f1 100%);
  box-shadow: 0 8px 32px rgba(99,102,241,0.18);
}
</style>
</head>
<body>
<h2 style="margin-top:32px;font-size:2.1rem;letter-spacing:-1px;">📤 <span style="color:#6366f1">Secure Uploader</span></h2>
<div class="card">
  <div class="icon">🔒</div>
  <h3 style="margin-bottom:10px;">QR Login</h3>
  <img src="data:image/png;base64,{{qr}}" width="140" style="border-radius:12px;box-shadow:0 2px 8px #a5b4fc55;">
</div>
<div class="card">
  <div class="icon">📁</div>
  <h3 style="margin-bottom:10px;">Upload Area</h3>
  <p style="margin-bottom:10px;"><b>Folder:</b> <span id="folder-label">{{folder}}</span> <span style="color:#a5b4fc;font-size:0.95em;">(locked by server)</span></p>
  <input id="new-folder" placeholder="Create new folder">
  <button onclick="createFolder()">Create & Use Folder</button>
  <button onclick="showUploads()" class="success-btn">Show Upload Log</button>
    <div class="drag-area" id="drag-area" style="padding:12px 0;">
        <div style="font-size:1.1rem;color:#818cf8;">⬆️ Drag & Drop files here or</div>
        <input type="file" id="file" multiple style="margin-top:6px;">
    </div>
    <div id="summary"></div>
    <div id="gallery-title" style="font-weight:600;margin:18px 0 6px 0;font-size:1.1rem;">Gallery</div>
    <div id="gallery" class="gallery-grid"></div>
    <div id="upload-log"></div>
  <button onclick="upload()">Upload</button>
  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>
  <p id="status">0%</p>
  <ul id="log"></ul>
</div>
<div id="summary"></div>
<div id="upload-log"></div>
<script>
function showUploads() {
        let folder = currentFolder;
        fetch(`/list-uploads?folder=${encodeURIComponent(folder)}`)
            .then(r => r.json())
            .then(res => {
                let logDiv = document.getElementById("upload-log");
                if(res.status === "ok") {
                    let files = res.files;
                    if(files.length === 0) {
                        logDiv.innerHTML = `<b>No uploads in folder:</b> ${folder}`;
                    } else {
                        logDiv.innerHTML = `<b>Uploads in folder:</b> ${folder}<ul>` + files.map(f => `<li>${f}</li>`).join("") + "</ul>";
                    }
                } else {
                    logDiv.innerHTML = `<b>Error:</b> ${res.error || "Unknown error"}`;
                }
                logDiv.style.display = "block";
            });
}
let currentFolder = "{{folder}}";
function createFolder() {
    let folder = document.getElementById("new-folder").value.trim();
    if (!folder) return alert("Enter folder name");
    fetch("/create-folder", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({folder})
    }).then(r => r.json()).then(res => {
        if(res.status === "ok") {
            currentFolder = folder;
            document.getElementById("folder-label").innerText = folder;
            alert("Folder set to: " + folder);
        } else {
            alert(res.error || "Failed");
        }
    });
}
// Utility for formatting bytes
function formatBytes(bytes) {
    if (bytes < 1024) return bytes + ' B';
    let kb = bytes / 1024;
    if (kb < 1024) return kb.toFixed(1) + ' KB';
    let mb = kb / 1024;
    return mb.toFixed(1) + ' MB';
}

function upload(){
    let files=document.getElementById("file").files;
    let log=document.getElementById("log");
    log.innerHTML = "";
    document.getElementById("summary").innerText = "";
    if(!files.length) return alert("Select file(s)");
    let total = files.length;
    let done = 0;
    let totalBytes = 0;
    for(let f of files) totalBytes += f.size;
    let uploadedBytes = 0;
    let startTime = Date.now();
    let fileProgressBars = [];

    function updateBar() {
        let p = Math.round(done/total*100);
        document.getElementById("bar").style.width=p+"%";
        document.getElementById("status").innerText=done+"/"+total+" ("+p+"%)";
        // Overall speed and ETA
        let elapsed = (Date.now() - startTime) / 1000;
        let speed = uploadedBytes / elapsed;
        let eta = speed > 0 ? (totalBytes - uploadedBytes) / speed : 0;
        let speedStr = speed ? formatBytes(speed) + "/s" : "-";
        let etaStr = eta ? Math.round(eta) + "s" : "-";
        document.getElementById("status").innerText += ` | Speed: ${speedStr} | ETA: ${etaStr}`;
    }
    updateBar();
    let finishedFiles = [];
    for(let i=0;i<files.length;i++){
        let file = files[i];
        let fd=new FormData();
        fd.append("file",file);
        fd.append("folder",currentFolder);
        let li = document.createElement("li");
        li.innerHTML = `<b>${file.name}</b> <span class='file-status'>Uploading...</span><br><div class='progress'><div class='bar' style='width:0%;height:10px;background:#4f46e5'></div></div>`;
        log.appendChild(li);
        let bar = li.querySelector('.bar');
        let status = li.querySelector('.file-status');
        fileProgressBars.push(bar);
        let xhr=new XMLHttpRequest();
        xhr.open("POST","/",true);
        xhr.upload.onprogress=function(e){
            if(e.lengthComputable){
                let percent = Math.round(e.loaded/e.total*100);
                bar.style.width = percent + "%";
            }
        };
        xhr.onload=function(){
            done++;
            uploadedBytes += file.size;
            if(xhr.status==200){
                status.innerText = "Uploaded ✔";
                bar.style.background = "#22c55e";
                finishedFiles.push({name: file.name, size: file.size, status: 'Uploaded'});
            }else{
                status.innerText = "Failed ❌";
                bar.style.background = "#ef4444";
                finishedFiles.push({name: file.name, size: file.size, status: 'Failed'});
            }
            updateBar();
            if(done === total) showSummary();
        };
        xhr.onerror=function(){
            done++;
            status.innerText = "Failed ❌";
            bar.style.background = "#ef4444";
            uploadedBytes += file.size;
            finishedFiles.push({name: file.name, size: file.size, status: 'Failed'});
            updateBar();
            if(done === total) showSummary();
        };
        xhr.send(fd);
    }
    function showSummary() {
        let ok = finishedFiles.filter(f => f.status === 'Uploaded');
        let fail = finishedFiles.filter(f => f.status !== 'Uploaded');
        let html = `<b>Upload Summary:</b><br>`;
        html += `Success: ${ok.length}, Failed: ${fail.length}<br>`;
        html += `<ul style='text-align:left;max-width:350px;margin:0 auto;'>`;
        for(let f of finishedFiles){
            html += `<li>${f.status === 'Uploaded' ? '✔️' : '❌'} ${f.name} (${formatBytes(f.size)})</li>`;
        }
        html += `</ul>`;
        document.getElementById("summary").innerHTML = html;
    }
}
// Drag & Drop support
const dragArea = document.getElementById('drag-area');
const fileInput = document.getElementById('file');
if (dragArea) {
    dragArea.addEventListener('dragover', function(e) {
        e.preventDefault();
        dragArea.classList.add('dragover');
    });
    dragArea.addEventListener('dragleave', function(e) {
        e.preventDefault();
        dragArea.classList.remove('dragover');
    });
    dragArea.addEventListener('drop', function(e) {
        e.preventDefault();
        dragArea.classList.remove('dragover');
        if (e.dataTransfer.files && e.dataTransfer.files.length) {
            fileInput.files = e.dataTransfer.files;
        }
    });
}
// Gallery feature (Google Photos style)
function loadGallery() {
    fetch('/list-uploads?folder=' + encodeURIComponent(currentFolder))
        .then(r => r.json())
        .then(res => {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            if (res.status === 'ok' && res.files.length) {
                res.files.forEach(f => {
                    if (f.match(/\.(jpg|jpeg|png|gif|webp|bmp)$/i)) {
                        const img = document.createElement('img');
                        img.src = `/uploads/${currentFolder}/${f}`;
                        img.alt = f;
                        img.title = f;
                        gallery.appendChild(img);
                    }
                });
            } else {
                gallery.innerHTML = '<div style="color:#a5b4fc;text-align:center;padding:18px 0;">No images yet.</div>';
            }
        });
}
window.addEventListener('DOMContentLoaded', loadGallery);

// Floating upload button
const floatBtn = document.createElement('button');
floatBtn.className = 'floating-upload-btn';
floatBtn.innerHTML = '⬆️';
floatBtn.title = 'Upload';
floatBtn.onclick = () => document.getElementById('file').click();
document.body.appendChild(floatBtn);

// Reload gallery after upload
const origUpload = upload;
upload = function() {
    origUpload();
    setTimeout(loadGallery, 1200);
}
</script>
</body>
</html>
